version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: parking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking123
      POSTGRES_DB: parking_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d parking_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: parking-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: parking
      RABBITMQ_DEFAULT_PASS: parking123
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: parking-backend
    restart: unless-stopped
    ports:
      - "5050:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://parking:parking123@db:5432/parking_db
      RABBITMQ_URL: amqp://parking:parking123@rabbitmq:5672
      JWT_SECRET: dev-secret-change-in-production
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: parking-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5050/api
    depends_on:
      - backend
    volumes:
      - ../frontend/src:/app/src

volumes:
  pgdata:
